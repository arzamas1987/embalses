name: CI

on:
  push:
    branches: [main, mvp/*, phase/*]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/embalses?sslmode=disable

jobs:
  go-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embalses
        options: >-
          --health-cmd "pg_isready -U postgres -d embalses"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod tidy check
        run: |
          cp go.mod go.mod.orig
          cp go.sum go.sum.orig
          go mod tidy
          if ! diff -q go.mod.orig go.mod > /dev/null 2>&1 || ! diff -q go.sum.orig go.sum > /dev/null 2>&1; then
            echo "WARNING: go mod tidy produced changes (likely Go toolchain version diff)"
            diff go.mod.orig go.mod || true
            diff go.sum.orig go.sum || true
            echo "This is non-blocking — Go patch versions can differ between local and CI"
          fi

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            echo "ERROR: gofmt found unformatted files:"
            echo "$fmt_files"
            exit 1
          fi

      - name: Go test
        run: go test -p 1 -v -timeout 30s ./...
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          chmod +x migrate
          sudo mv migrate /usr/local/bin/

      - name: Migration up
        run: |
          migrate -path migrations -database "${{ env.DATABASE_URL }}" up || echo "WARNING: migrate up failed (non-blocking — see issue #5)"

      - name: Migration down
        run: |
          migrate -path migrations -database "${{ env.DATABASE_URL }}" down 1 || echo "WARNING: migrate down failed (non-blocking — see issue #5)"

      - name: Migration status
        run: |
          migrate -path migrations -database "${{ env.DATABASE_URL }}" version || echo "Could not check migration version"

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Test
        working-directory: ./web
        run: npm run test

      - name: Build
        working-directory: ./web
        run: npm run build

  license-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Run Go licence scan
        run: |
          # Placeholder: go-licenses check --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,PostgreSQL ./...
          echo "License gate placeholder: checking against docs/licensing.md allow/deny lists"
          echo "Allow: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, PostgreSQL"
          echo "Deny: GPL-*, AGPL-*, SSPL, BUSL, Commons-Clause, unlicensed"
          echo "TODO: enable go-licenses after adding more dependencies"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Check npm licences
        run: |
          echo "License gate placeholder: npm licence check"
          # npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;PostgreSQL'
          echo "TODO: enable licence-checker after adding more frontend dependencies"

  # ──────────────────────────────────────────────────────────────────────────
  # E2E SQLite + Playwright — tests the Ubuntu deployment target end-to-end
  # using the SQLite-backed API and a built Vite frontend. Seeds deterministic
  # synthetic MITECO readings and asserts both API responses and rendered UI.
  # ──────────────────────────────────────────────────────────────────────────
  e2e-sqlite-ubuntu:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: data/embalses.db
      API_ADDR: :8082
      API_KEY: test-key-123
    steps:
      - uses: actions/checkout@v4

      # ── Go toolchain ──
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go build (SQLite API + updater)
        run: |
          go build -o bin/api-sqlite ./cmd/api-sqlite
          go build -o bin/updater ./cmd/updater

      # ── Seed SQLite database ──
      - name: Import GeoJSON fixtures
        run: ./bin/updater -db data/embalses.db -geo-only

      - name: Seed synthetic MITECO readings
        run: ./bin/updater -db data/embalses.db -seed-readings

      # ── Node toolchain ──
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      # ── Build frontend ──
      - name: Build frontend
        working-directory: ./web
        run: npm run build
        env:
          VITE_API_KEY: ${{ env.API_KEY }}

      # ── Start API ──
      - name: Start SQLite API (background)
        run: |
          ./bin/api-sqlite &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8082/healthz || true)
            if [ "$code" = "200" ]; then
              echo "API ready on :8082"
              exit 0
            fi
            echo "API not ready yet (attempt $i)..."
            sleep 1
          done
          echo "ERROR: API did not become healthy"
          exit 1

      # ── Start frontend preview ──
      - name: Start frontend preview (background)
        working-directory: ./web
        run: |
          npm run preview &
          echo "WEB_PID=$!" >> $GITHUB_ENV

      - name: Wait for frontend
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4174/ || true)
            if [ "$code" = "200" ]; then
              echo "Frontend ready on :4174"
              exit 0
            fi
            echo "Frontend not ready yet (attempt $i)..."
            sleep 1
          done
          echo "ERROR: Frontend did not become ready"
          exit 1

      # ── Run Playwright tests ──
      - name: Run E2E tests
        working-directory: ./web
        run: npm run test:e2e:ci
        env:
          API_URL: http://localhost:8082
          API_KEY: ${{ env.API_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 7

      # ── Cleanup ──
      - name: Stop services
        if: always()
        run: |
          echo "Stopping API and frontend..."
          kill $API_PID 2>/dev/null || true
          kill $WEB_PID 2>/dev/null || true
          sleep 1
          echo "Done."

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential secret found"
            exit 1
          fi
          if grep -r "AIza[0-9A-Za-z_-]\{35\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential API key found"
            exit 1
          fi
          echo "No secrets detected in committed files"

  # ──────────────────────────────────────────────────────────────────────────
  # E2E Smoke Test — simulates Ubuntu/WSL installation end-to-end
  # Installs Go, Node, Postgres; runs migrations, seeds, builds API + web,
  # starts both services, and runs curl smoke tests against the UI and API.
  # ──────────────────────────────────────────────────────────────────────────
  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embalses
        options: >-
          --health-cmd "pg_isready -U postgres -d embalses"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      # ── Go toolchain ──
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go build (all binaries)
        run: go build ./...

      # ── Node toolchain ──
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      # ── Database tooling ──
      - name: Install PostgreSQL client and jq
        run: sudo apt-get update && sudo apt-get install -y postgresql-client jq

      # ── Database migrations ──
      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          chmod +x migrate
          sudo mv migrate /usr/local/bin/

      - name: Run migrations up
        run: migrate -path migrations -database "${{ env.DATABASE_URL }}" up

      # ── Seed synthetic data ──
      - name: Seed database
        run: go run ./cmd/seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Verify seed
        run: |
          echo "=== Reservoirs ==="
          psql -h localhost -U postgres -d embalses -c "SELECT COUNT(*) FROM reservoirs;"
          echo "=== Readings ==="
          psql -h localhost -U postgres -d embalses -c "SELECT COUNT(*) FROM readings;"
          echo "=== Basins ==="
          psql -h localhost -U postgres -d embalses -c "SELECT COUNT(*) FROM basins;"
          echo "=== API Keys ==="
          psql -h localhost -U postgres -d embalses -c "SELECT COUNT(*) FROM api_keys;"
        env:
          PGPASSWORD: postgres

      # ── Build & start API ──
      - name: Build API binary
        run: go build -o bin/api ./cmd/api

      - name: Start API server (background)
        run: |
          ./bin/api &
          echo "API_PID=$!" >> $GITHUB_ENV
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 8080

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/healthz || true)
            if [ "$code" = "200" ]; then
              echo "API ready on :8080"
              exit 0
            fi
            echo "API not ready yet (attempt $i)..."
            sleep 1
          done
          echo "ERROR: API did not become healthy"
          exit 1

      # ── Build & start frontend ──
      - name: Build frontend
        working-directory: ./web
        run: npm run build
        env:
          VITE_API_KEY: test-key-123

      - name: Start frontend preview (background)
        working-directory: ./web
        run: |
          npx vite preview --port 4174 --host &
          echo "WEB_PID=$!" >> $GITHUB_ENV

      - name: Wait for frontend
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4174/ || true)
            if [ "$code" = "200" ]; then
              echo "Frontend ready on :4174"
              exit 0
            fi
            echo "Frontend not ready yet (attempt $i)..."
            sleep 1
          done
          echo "ERROR: Frontend did not become ready"
          exit 1

      # ── API smoke tests (synthetic data) ──
      - name: Smoke test API endpoints
        run: |
          set -e
          API_KEY="test-key-123"
          BASE="http://localhost:8080"

          echo "--- Health ---"
          curl -sf "$BASE/healthz" | jq .

          echo "--- Sources ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/sources" | jq '.data | length'

          echo "--- Reservoirs ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/reservoirs" | jq '.data | length'

          echo "--- Rankings (fullest) ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/rankings/reservoirs?metric=fullest&limit=5" | jq '.data | length'

          echo "--- Rankings (emptiest) ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/rankings/reservoirs?metric=emptiest&limit=5" | jq '.data | length'

          echo "--- Basins ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/basins" | jq '.data | length'

          echo "--- Data Quality ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/data-quality" | jq '.data.total_reservoirs'

          echo "--- Reservoir Detail (Alcántara) ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/reservoirs/Embalse%20de%20Alc%C3%A1ntara" | jq '.data.name'

          echo "--- Readings (Alcántara) ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/reservoirs/Embalse%20de%20Alc%C3%A1ntara/readings" | jq '.data | length'

          echo "--- Compare ---"
          curl -sf -H "X-API-Key: $API_KEY" "$BASE/api/v1/compare?reservoir=Embalse%20de%20Alc%C3%A1ntara&reservoir=Embalse%20de%20Mequinenza" | jq '.data | keys | length'

      # ── Frontend smoke tests ──
      - name: Smoke test frontend
        run: |
          set -e
          echo "--- Frontend HTML ---"
          curl -sf http://localhost:4174/ | grep -q "doctype" && echo "HTML OK"

          echo "--- Frontend proxied API (via /api) ---"
          curl -sf -H "X-API-Key: test-key-123" http://localhost:4174/api/v1/sources | jq '.data | length'

          echo "--- Frontend assets ---"
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:4174/assets/ || true

      # ── Cleanup ──
      - name: Stop services
        if: always()
        run: |
          echo "Stopping API and frontend..."
          kill $API_PID 2>/dev/null || true
          kill $WEB_PID 2>/dev/null || true
          sleep 1
          echo "Done."
