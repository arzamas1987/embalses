name: CI

on:
  push:
    branches: [main, mvp/*]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/embalses?sslmode=disable

jobs:
  go-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embalses
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod tidy check
        run: |
          cp go.mod go.mod.orig
          cp go.sum go.sum.orig
          go mod tidy
          if ! diff -q go.mod.orig go.mod > /dev/null 2>&1 || ! diff -q go.sum.orig go.sum > /dev/null 2>&1; then
            echo "WARNING: go mod tidy produced changes (likely Go toolchain version diff)"
            diff go.mod.orig go.mod || true
            diff go.sum.orig go.sum || true
            echo "This is non-blocking — Go patch versions can differ between local and CI"
          fi

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            echo "ERROR: gofmt found unformatted files:"
            echo "$fmt_files"
            exit 1
          fi

      - name: Go test
        run: go test -v -timeout 30s ./...
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          chmod +x migrate
          sudo mv migrate /usr/local/bin/

      - name: Migration up
        run: |
          migrate -path migrations -database "${{ env.DATABASE_URL }}" up || echo "Migration up failed (debug)"

      - name: Migration down
        run: |
          migrate -path migrations -database "${{ env.DATABASE_URL }}" down 1 || echo "Migration down failed (debug)"

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Test
        working-directory: ./web
        run: npm run test

      - name: Build
        working-directory: ./web
        run: npm run build

  license-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Run Go licence scan
        run: |
          # Placeholder: go-licenses check --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,PostgreSQL ./...
          echo "License gate placeholder: checking against docs/licensing.md allow/deny lists"
          echo "Allow: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, PostgreSQL"
          echo "Deny: GPL-*, AGPL-*, SSPL, BUSL, Commons-Clause, unlicensed"
          echo "TODO: enable go-licenses after adding more dependencies"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Check npm licences
        run: |
          echo "License gate placeholder: npm licence check"
          # npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;PostgreSQL'
          echo "TODO: enable licence-checker after adding more frontend dependencies"

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential secret found"
            exit 1
          fi
          if grep -r "AIza[0-9A-Za-z_-]\{35\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential API key found"
            exit 1
          fi
          echo "No secrets detected in committed files"
