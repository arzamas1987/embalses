name: CI

on:
  push:
    branches: [main, mvp/*]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/embalses?sslmode=disable

jobs:
  go-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embalses
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go version and env
        run: |
          go version
          go env GOMODCACHE

      - name: Go mod tidy check
        run: |
          cp go.mod go.mod.orig
          cp go.sum go.sum.orig
          go mod tidy
          if ! diff -q go.mod.orig go.mod > /dev/null 2>&1 || ! diff -q go.sum.orig go.sum > /dev/null 2>&1; then
            echo "WARNING: go mod tidy produced changes"
            diff go.mod.orig go.mod || true
            diff go.sum.orig go.sum || true
          fi

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            echo "ERROR: gofmt found unformatted files:"
            echo "$fmt_files"
            exit 1
          fi

      - name: Go test
        run: go test -v -timeout 30s ./...
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Debug — list migration files
        run: |
          echo "Current directory: $(pwd)"
          ls -la migrations/
          echo "--- up.sql ---"
          cat migrations/000001_init.up.sql
          echo "--- down.sql ---"
          cat migrations/000001_init.down.sql

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          chmod +x migrate
          sudo mv migrate /usr/local/bin/
          which migrate
          migrate --version
          ldd $(which migrate) || echo "ldd not available"

      - name: Debug — check port and install psql
        run: |
          echo "Checking port 5432..."
          timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/5432' && echo "Port 5432 is open" || echo "Port 5432 is closed or timed out"
          echo "Installing psql..."
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          which psql
          psql --version

      - name: Debug — check database
        run: |
          echo "Trying to connect to database..."
          psql "${{ env.DATABASE_URL }}" -c "SELECT 1" 2>&1 || echo "psql connection failed"
          echo "Listing databases..."
          psql "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable" -c "\l" 2>&1 || echo "Cannot list databases"

      - name: Migration up
        run: |
          success=false
          for i in {1..30}; do
            if migrate -path migrations -database "${{ env.DATABASE_URL }}" up; then
              success=true
              break
            fi
            echo "Migration attempt $i failed, retrying in 1s..."
            sleep 1
          done
          if [ "$success" = false ]; then
            echo "Migration up failed after 30 attempts"
            exit 1
          fi

      - name: Migration down
        run: |
          success=false
          for i in {1..30}; do
            if migrate -path migrations -database "${{ env.DATABASE_URL }}" down; then
              success=true
              break
            fi
            echo "Migration down attempt $i failed, retrying in 1s..."
            sleep 1
          done
          if [ "$success" = false ]; then
            echo "Migration down failed after 30 attempts"
            exit 1
          fi

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Test
        working-directory: ./web
        run: npm run test

      - name: Build
        working-directory: ./web
        run: npm run build

  license-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Run Go licence scan
        run: |
          # Placeholder: go-licenses check --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,PostgreSQL ./...
          echo "License gate placeholder: checking against docs/licensing.md allow/deny lists"
          echo "Allow: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, PostgreSQL"
          echo "Deny: GPL-*, AGPL-*, SSPL, BUSL, Commons-Clause, unlicensed"
          echo "TODO: enable go-licenses after adding more dependencies"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Check npm licences
        run: |
          echo "License gate placeholder: npm licence check"
          # npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;PostgreSQL'
          echo "TODO: enable licence-checker after adding more frontend dependencies"

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          if grep -r "sk-[a-zA-Z0-9]\{20,\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential secret found"
            exit 1
          fi
          if grep -r "AIza[0-9A-Za-z_-]\{35\}" . --include="*.go" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" 2>/dev/null; then
            echo "ERROR: Potential API key found"
            exit 1
          fi
          echo "No secrets detected in committed files"
